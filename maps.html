<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Green</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        h3 {
            margin-top: 0px;
        }
        p { 
            padding: 0px;
            margin-top: 0px;
            margin-bottom: 0px;
        }
        body {
            font-family: Verdana, sans-serif;
            background-color: #08b9ff;
            text-align: left;
        }
        .box {
            width: flex;
            height: 900px;
            padding: 20px;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        #map {
            width: 100%;
            height: 90%;
            border-radius: 15px;
        }

        .mapboxgl-popup {
            width: 600px;
            font: 12px/15px 'Verdana', sans-serif;
        }
    </style>
</head>

<body>
    <header>
        <div class="navbar">
            <a href="index.html">Home</a>
            <a href="solar.html">Solar Energy</a>
            <a href="wind.html">Wind Energy</a>
            <a href="hydroelectric.html">Hydroelectric Energy</a>
            <a href="bioenergy.html">Biomass Energy</a>
            <a href="geothermal.html">Geothermal Energy</a>
            <a href="maps.html" class="active">Map</a>
            <a href="comparison.html">Comparison Tool</a>
            <a href="forum.html">Community Forum</a>
        </div>
    </header>

    <main class="content">
        <div class="box">
            <h2>Production of Renewable Energy Map</h2>
            <div id="map"></div>
            <script>
                mapboxgl.accessToken = 'pk.eyJ1IjoiamsxMyIsImEiOiJjbTJxaXV5bTMxMmc5MmpxM3Fkajk5bHRyIn0.Jb5c4G3hOdHr-IFLyyG02g';
        
                const map = new mapboxgl.Map({
                    container: 'map',
                    style: 'mapbox://styles/mapbox/streets-v12',
                    center: [-100.486052, 37.830348],
                    zoom: 3
                });
        
                // get state boundaries and custom data
                Promise.all([
                    fetch('https://docs.mapbox.com/mapbox-gl-js/assets/us_states.geojson').then(response => response.json()),
                    fetch('https://raw.githubusercontent.com/gteves/Global-Green/refs/heads/main/state_info.json').then(response => response.json())
                ])
                .then(([geojson, stateData]) => {
                    // Merge custom data with state boundary
                    geojson.features.forEach(feature => {
                        const stateName = feature.properties.STATE_NAME;
                        const customData = stateData.find(state => state.name === stateName);
        
                        if (customData) {
                            feature.properties = { ...feature.properties, ...customData };
                        }
        
                        // log merge
                        console.log('Merged Feature Properties: ', feature.properties);  // Check if the properties have custom data
                    });
        
                    // Add the merged data to the map
                    map.addSource('states', {
                        'type': 'geojson',
                        'data': geojson
                    });
        
                    // Add layers to the map
                    map.addLayer({
                        'id': 'state-fills',
                        'type': 'fill',
                        'source': 'states',
                        'layout': {},
                        'paint': {
                            'fill-color': '#627BC1',
                            'fill-opacity': [
                                'case',
                                ['boolean', ['feature-state', 'hover'], false],
                                1,
                                0.5
                            ]
                        }
                    });
        
                    map.addLayer({
                        'id': 'state-borders',
                        'type': 'line',
                        'source': 'states',
                        'layout': {},
                        'paint': {
                            'line-color': '#627BC1',
                            'line-width': 2
                        }
                    });
        
                    // hover and pop up
                    let hoveredPolygonId = null;
                    const popup = new mapboxgl.Popup({
                        closeButton: false,
                        closeOnClick: false
                    });
        
                    map.on('mousemove', 'state-fills', (e) => {
                        if (e.features.length > 0) {
                            if (hoveredPolygonId !== null) {
                                map.setFeatureState(
                                    { source: 'states', id: hoveredPolygonId },
                                    { hover: false }
                                );
                            }
        
                            hoveredPolygonId = e.features[0].id;
        
                            map.setFeatureState(
                                { source: 'states', id: hoveredPolygonId },
                                { hover: true }
                            );
        
                            const feature = e.features[0];
                            popup
                                .setLngLat(e.lngLat)
                                .setHTML(`
                                    <h3>${feature.properties.STATE_NAME}</h3>
                                    <p><strong>Rank:</strong> ${feature.properties.rank || 'N/A'}</p>
                                    <p><strong>Total Renewable Energy Production:</strong> ${feature.properties['total renewable energy production'] || 'N/A'}</p>
                                    <p><strong>Wind:</strong> ${feature.properties.wind || 'N/A'}</p>
                                    <p><strong>Solar:</strong> ${feature.properties.solar || 'N/A'}</p>
                                    <p><strong>Geothermal:</strong> ${feature.properties.geothermal || 'N/A'}</p>
                                    <p><strong>Wood/Wood Derived:</strong> ${feature.properties['wood/wood derived'] || 'N/A'}</p>
                                    <p><strong>Other Biomass:</strong> ${feature.properties['other biomass'] || 'N/A'}</p>
                                `)
                                .addTo(map);
                        }
                    });
        
                    map.on('mouseleave', 'state-fills', () => {
                        if (hoveredPolygonId !== null) {
                            map.setFeatureState(
                                { source: 'states', id: hoveredPolygonId },
                                { hover: false }
                            );
                        }
                        hoveredPolygonId = null;
                        popup.remove();
                    });
                })
                .catch(error => console.error('Error fetching state data:', error));
            </script>
            <small>Information about production comes from EIA 2022 data.</small>
        </div>
    </main>
</body>

</html>
